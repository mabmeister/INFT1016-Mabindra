<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eynesbury College - Learning Goals</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --text: #333;
            --box-bg: #ffffff;
            --primary: #004a99;
            --border: #ccc;
            --nav-bg: #004a99;
        }

        body.dark-mode {
            --bg: #1a1a1a;
            --text: #f4f4f4;
            --box-bg: #2d2d2d;
            --border: #444;
            --nav-bg: #002b5c;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Navigation Bar */
        nav {
            width: 100%;
            background-color: var(--nav-bg);
            padding: 15px 0;
            display: flex;
            justify-content: center;
            gap: 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
        }

        nav a:hover { text-decoration: underline; }

        /* Layout Containers */
        .main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            width: 100%;
            min-height: 80vh;
        }

        /* The Password Box */
        .login-box {
            background: var(--box-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
            border: 1px solid var(--border);
        }

        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
        }

        .btn {
            padding: 12px 24px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn:hover { opacity: 0.8; transform: scale(1.02); }

        /* Subject Table */
        #content-screen { display: none; width: 90%; max-width: 900px; padding: 20px; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--box-bg);
            margin-top: 20px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background-color: var(--primary); color: white; }

        .controls {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 10px 20px;
            box-sizing: border-box;
        }

        .error { color: #ff4d4d; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <nav>
        <a href="webpage.html">Home</a>
        <a href="course.html">Courses</a>
        <a href="#">Learning Goals</a>
    </nav>

    <div class="controls">
        <button class="btn" onclick="toggleTheme()">Toggle Theme</button>
    </div>

    <div class="main-content">
        <div id="password-screen" class="login-box">
            <h2 style="color: var(--primary);">Secure Login</h2>
            <p>Enter password to view your subjects</p>
            <div id="error-msg" class="error"></div>
            <input type="password" id="pass-input" placeholder="Password">
            <button class="btn" onclick="checkPassword()">View Subjects</button>
        </div>

        <div id="content-screen">
            <h2 style="text-align: center;">My Learning Goals</h2>
            <table>
                <thead>
                    <tr>
                        <th>Subject Name</th>
                        <th>Core Description</th>
                    </tr>
                </thead>
                <tbody id="subject-rows"></tbody>
            </table>
        </div>
    </div>
    <footer>
        <p>&copy; 2025/2026 - Mabindra Bahadur Moktan Eynesbury College. All rights reserved.</p>
    </footer>



    <script>
        const subjects = [
            { name: "IT Fundamentals", desc: "Computer hardware, operating systems, and basic software concepts." },
            { name: "Design Thinking Studio", desc: "Solving human problems through creative prototyping and testing." },
            { name: "Programming", desc: "Learning Python/JavaScript logic to solve computational problems." },
            { name: "Network Fundamentals", desc: "Understanding how the internet and local networks connect devices." }
        ];

        function checkPassword() {
            const userInput = document.getElementById("pass-input").value;
            const errorDiv = document.getElementById("error-msg");

            if (userInput === "Haneen") {
                document.getElementById("password-screen").style.display = "none";
                document.getElementById("content-screen").style.display = "block";
                
                const tableBody = document.getElementById("subject-rows");
                tableBody.innerHTML = subjects.map(s => `
                    <tr>
                        <td><strong>${s.name}</strong></td>
                        <td>${s.desc}</td>
                    </tr>
                `).join('');
            } else {
                errorDiv.innerText = "❌ Incorrect Password";
            }
        }

        function toggleTheme() {
            document.body.classList.toggle("dark-mode");
        }
    </script>
</body>
</html>
